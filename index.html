<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KalaM Login</title>
<style>
body{font-family:Arial,sans-serif;background:#f2f2f2;display:flex;align-items:center;justify-content:center;height:100vh;}
.login-box{background:#fff;padding:30px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);width:350px;text-align:center;}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #ccc;}
button{background:#007bff;color:white;border:none;cursor:pointer;font-weight:bold;}
button:hover{background:#0056b3;}
#msg{font-size:14px;margin-top:8px;min-height:18px;}
</style>
</head>
<body>

<div class="login-box">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username / Mobile">
  <input type="password" id="pin" placeholder="PIN">
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbylWY9IWZYePLWGmktYt0VqoxagMIQhuapYNe3CrK2dBXHCYhlYAlnrC0cdlvWWRiq5pQ/exec";
async function login(){
  const username = document.getElementById('username').value.trim();
  const pin = document.getElementById('pin').value.trim();
  const msg = document.getElementById('msg');
  msg.style.color = "red";

  if(!username || !pin){ msg.innerText="Username ও PIN দিন"; return; }

  msg.style.color = "#555";
  msg.innerText = "যাচাই করা হচ্ছে...";

  try {
    const res = await fetch(WEBAPP_URL, {
      method:"POST",
      body: JSON.stringify({ action:"login", username, pin })
    });
    const data = await res.json();

    if(data.status){
      // Save user details
      localStorage.setItem("userPIN", pin);
      localStorage.setItem("username", data.username);
      localStorage.setItem("role", data.role);
      localStorage.setItem("userBalance", data.balance);

      msg.style.color="green";
      msg.innerText="Login সফল, রিডাইরেক্ট হচ্ছি...";

      setTimeout(()=>{
        if(data.role === "agent") window.location.href="agent-dashboard.html";
        else window.location.href="personal-dashboard.html";
      },800);

    } else {
      msg.innerText = data.message;
    }

  } catch(err){
    msg.innerText="Server error. Try again!";
    console.error(err);
  }
}
</script>

</body>
</html>
