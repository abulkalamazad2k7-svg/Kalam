<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>কালাম লগইন</title>
<style>
body { font-family: Arial, sans-serif; background: #f2f2f2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.container { background: #fff; padding: 20px 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 350px; text-align: center; }
h2 { color: #1a73e8; }
input[type="text"], input[type="password"] { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
button { padding: 10px 20px; background: #1a73e8; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
button:hover { background: #1666c1; }
</style>
</head>
<body>

<div class="container">
  <h2>কালাম লগইন</h2>
  <input type="text" id="userNumber" placeholder="মোবাইল নাম্বার">
  <input type="password" id="pin" placeholder="PIN">
  <button onclick="login()">লগইন</button>
</div>

<script>
// আপনার দেওয়া সেই বিশেষ এজেন্ট ডাটা
const users = [
  { number: "01346-530733", pin: "2583", role: "agent" }
];

// মোবাইল নাম্বারে অটোমেটিক "-" ফরম্যাট
const userNumberInput = document.getElementById("userNumber");
userNumberInput.addEventListener("input", function() {
  let val = this.value.replace(/-/g, "").slice(0,11); 
  if(val.length > 5) val = val.slice(0,5) + "-" + val.slice(5);
  this.value = val;
});

function login() {
  const num = document.getElementById("userNumber").value;
  const pin = document.getElementById("pin").value;
  
  // ইউজার চেক করা
  const user = users.find(u => u.number === num && u.pin === pin);
  
  if(!user){ 
    alert("নাম্বার বা PIN ভুল"); 
    return; 
  }

  // লগইন সফল হলে আপনার তৈরি করা dashboard.html এ চলে যাবে
  if(user.role === "agent"){
    alert("এজেন্ট লগইন সফল!");
    window.location.href = "dashboard.html"; 
  }
}
</script>

</body>
</html>
