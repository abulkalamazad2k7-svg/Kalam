<script>
    const currentUser = { 
        number: "01346-530733", 
        role: "agent", 
        balance: 5250.00, 
        pin: "2583" 
    };

    // ব্যালেন্স এডিট ও টগল লজিক
    const balanceToggle = document.getElementById("balanceToggle");
    const balanceText = document.getElementById("balanceText");
    let isVisible = false;
    let longPressTimer;

    balanceToggle.addEventListener("mousedown", () => {
        longPressTimer = setTimeout(() => {
            let newBalance = prompt("নতুন ব্যালেন্স:", currentUser.balance);
            if (newBalance !== null && !isNaN(newBalance)) {
                currentUser.balance = parseFloat(newBalance);
                balanceText.innerText = currentUser.balance.toFixed(2) + " Tk";
            }
        }, 1000);
    });
    balanceToggle.addEventListener("mouseup", () => clearTimeout(longPressTimer));

    balanceToggle.addEventListener("click", () => {
        if(!isVisible){
            balanceText.innerText = currentUser.balance.toFixed(2) + " Tk";
            isVisible = true;
            setTimeout(() => { balanceText.innerText = "Tap for Balance"; isVisible = false; }, 3000);
        }
    });

    // নতুন ইউজার খোলার এবং সেভ করার লজিক
    function processAddUser() {
        const agentPin = document.getElementById('agentConfirmPin').value;
        const newNum = document.getElementById('newUserMobile').value;
        const newPin = document.getElementById('newUserPin').value;

        if (agentPin === currentUser.pin) {
            let savedUsers = JSON.parse(localStorage.getItem('kalam_users')) || [];
            
            savedUsers.push({
                number: newNum,
                pin: newPin,
                role: "personal"
            });

            localStorage.setItem('kalam_users', JSON.stringify(savedUsers));
            alert("সফল হয়েছে! নতুন অ্যাকাউন্ট তৈরি করা হয়েছে।");
            closeAll();
        } else {
            alert("ভুল এজেন্ট পিন!");
        }
    }

    // মোবাইল ফরম্যাট এবং পেজ নেভিগেশন আপনার আগের কোড অনুযায়ী থাকবে
    function openPage(id) {
        document.getElementById("mainDashboard").classList.add("hidden");
        document.getElementById(id).classList.remove("hidden");
    }

    function closeAll() {
        document.querySelectorAll('.full-page-view').forEach(p => p.classList.add('hidden'));
        document.getElementById("mainDashboard").classList.remove("hidden");
    }
</script>
